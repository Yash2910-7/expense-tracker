<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expense Tracker</title>
    <!-- Bring over fonts identical to login screen -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Exact same stylistic resets as login page */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0e1a;
            font-family: 'DM Sans', sans-serif;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1, h2 { font-family: 'Syne', sans-serif; }

        .auth-card {
            background: #141929;
            padding: 3rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(59, 130, 246, 0.1);
            animation: slide-up 0.5s ease-out;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); /* Cyan Glow */
        }

        .form-group { margin-bottom: 1.5rem; }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #06b6d4; /* Switch accent color to cyan for variety */
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        /* Register button utilizing Cyan primary coloring */
        .btn {
            background: #06b6d4; /* Base Cyan */
            color: #fff;
            border: none;
            width: 100%;
            padding: 0.85rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn:hover {
            background: #22d3ee;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        .auth-footer a {
            color: #3b82f6; /* Contrasting blue */
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s;
        }
        
        .auth-footer a:hover {
            color: #60a5fa;
        }

        .alerts { margin-bottom: 1rem; }
        .alert {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #86efac;
            border: 1px solid #22c55e;
        }
    </style>
</head>
<body>

    <!-- Container wrapper constraint -->
    <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        
        <!-- Render possible application flashes, mostly username-existed failures -->
        <div class="alerts">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <!-- Start the POST connection pipeline explicitly aimed at /register  -->
        <form method="POST" action="/register">
            
            <!-- Require arbitrary Username strings -->
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose a username">
            </div>

            <!-- Email formatting field (must contain `@` by modern browser standards) -->
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            
            <!-- Obscured payload string -->
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Create a strong password">
            </div>
            
            <button type="submit" class="btn">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>

</body>
</html>
