{% extends 'base.html' %}

{% block title %}Recover Password - Smart Spend AI{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-shield-lock-fill text-warning"></i>
        <h2 class="mt-2">Forgot Password</h2>
        <p class="text-secondary small">Enter your email to receive a password reset OTP code</p>
    </div>
    
    <form action="{{ url_for('auth.forgot_password') }}" method="POST">
        <div class="mb-4">
            <label for="email" class="form-label text-secondary small">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control bg-dark border-secondary text-white" id="email" name="email" required placeholder="alex@example.com">
            </div>
        </div>
        
        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-4">
            <i class="bi bi-send-fill me-2"></i>Send Verification Code
        </button>
    </form>
    
    <div class="text-center">
        <a href="{{ url_for('auth.login') }}" class="text-secondary small text-decoration-none"><i class="bi bi-arrow-left me-2"></i>Back to Sign In</a>
    </div>
</div>
{% endblock %}
