{% extends 'base.html' %}

{% block title %}Reset Password - Smart Spend AI{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-shield-plus text-success"></i>
        <h2 class="mt-2">Reset Password</h2>
        <p class="text-secondary small">Define a new strong security password for your account</p>
    </div>
    
    <form action="{{ url_for('auth.reset_password') }}" method="POST">
        <div class="mb-3">
            <label for="password" class="form-label text-secondary small">New Password</label>
            <input type="password" class="form-control bg-dark border-secondary text-white" id="password" name="password" required placeholder="Choose a strong password">
            <div id="password-feedback"></div>
        </div>
        
        <div class="mb-4">
            <label for="confirm_password" class="form-label text-secondary small">Confirm Password</label>
            <input type="password" class="form-control bg-dark border-secondary text-white" id="confirm_password" name="confirm_password" required placeholder="Re-type password">
        </div>
        
        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-4">
            Save New Password
        </button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Live validation rules check on password reset screen
    checkPasswordStrength('password', 'password-feedback');
</script>
{% endblock %}
