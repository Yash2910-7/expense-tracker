{% extends 'base.html' %}

{% block title %}Sign In - Smart Spend AI{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-cpu-fill"></i>
        <h2 class="mt-2">Welcome Back</h2>
        <p class="text-secondary small">Access your AI-powered financial companion</p>
    </div>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="mb-3">
            <label for="email" class="form-label text-secondary small">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control bg-dark border-secondary text-white" id="email" name="email" required placeholder="alex@example.com">
            </div>
        </div>
        
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <label for="password" class="form-label text-secondary small mb-0">Password</label>
                <a href="{{ url_for('auth.forgot_password') }}" class="text-primary small text-decoration-none">Forgot?</a>
            </div>
            <div class="input-group mt-1">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control bg-dark border-secondary text-white" id="password" name="password" required placeholder="Enter password">
            </div>
        </div>
        
        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
        
        <!-- Google OAuth Mockup Integration Button -->
        <a href="{{ url_for('auth.google_auth') }}" class="btn btn-outline-secondary w-100 py-2.5 d-flex align-items-center justify-content-center gap-2 mb-4 text-white">
            <i class="fa-brands fa-google text-danger"></i>
            <span>Continue with Google</span>
        </a>
    </form>
    
    <div class="text-center">
        <p class="text-secondary small mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none">Create Account</a></p>
    </div>
</div>
{% endblock %}
