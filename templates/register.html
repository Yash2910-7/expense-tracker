{% extends 'base.html' %}

{% block title %}Create Account - Smart Spend AI{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="bi bi-cpu-fill"></i>
        <h2 class="mt-2">Register Account</h2>
        <p class="text-secondary small">Set up your private wealth ledger</p>
    </div>
    
    <form action="{{ url_for('auth.register') }}" method="POST" id="register-form">
        <div class="mb-3">
            <label for="name" class="form-label text-secondary small">Full Name</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control bg-dark border-secondary text-white" id="name" name="name" required placeholder="Alex Finance">
            </div>
        </div>
        
        <div class="mb-3">
            <label for="email" class="form-label text-secondary small">Email Address</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control bg-dark border-secondary text-white" id="email" name="email" required placeholder="alex@example.com">
            </div>
        </div>
        
        <div class="mb-4">
            <label for="password" class="form-label text-secondary small">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control bg-dark border-secondary text-white" id="password" name="password" required placeholder="Enter strong password">
            </div>
            <!-- Live Password rules progress feedback container -->
            <div id="password-feedback"></div>
        </div>
        
        <button type="submit" class="btn btn-premium w-100 py-2.5 mb-4">
            <i class="bi bi-person-plus-fill me-2"></i>Sign Up
        </button>
    </form>
    
    <div class="text-center">
        <p class="text-secondary small mb-0">Already registered? <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none">Sign In</a></p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Activate password checking rules on the registration screen
    checkPasswordStrength('password', 'password-feedback');
</script>
{% endblock %}
